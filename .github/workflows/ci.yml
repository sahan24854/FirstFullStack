name: CI - Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: cd todo-list-app/backend && npm install

      - name: Verify frontend files
        run: |
          echo "Frontend files:"
          ls todo-list-app/frontend/

      - name: Build success
        run: echo "✅ CI Pipeline completed successfully!"
