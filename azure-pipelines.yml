trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and Test
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:

    - script: |
        node --version
        npm --version
        echo "✅ Node.js already available"
      displayName: Check Node.js Version

    - script: |
        cd todo-list-app/backend
        npm install
        npm run build
        echo "✅ Backend built successfully"
      displayName: Build Backend

    - script: |
        echo "Frontend files:"
        ls todo-list-app/frontend/
        echo "✅ Frontend verified"
      displayName: Verify Frontend

    - task: Docker@2
      displayName: Build Docker Image
      inputs:
        command: build
        dockerfile: '$(Build.SourcesDirectory)/todo-list-app/backend/Dockerfile'
        repository: 'sahan24854/todo-list-app'
        tags: $(tag)

    - script: |
        echo "✅ Pipeline completed!"
        echo "Build ID: $(Build.BuildId)"
      displayName: Build Complete