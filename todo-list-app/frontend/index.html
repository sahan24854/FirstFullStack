<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - Todo List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="time">9:41</span>
            <div class="status-icons">
                <svg width="68" height="12" viewBox="0 0 68 12" fill="none">
                    <rect x="0" y="3" width="3" height="9" fill="#1A1A18"/>
                    <rect x="4" y="2" width="3" height="10" fill="#1A1A18"/>
                    <rect x="8" y="1" width="2.5" height="11" fill="#1A1A18"/>
                    <rect x="12" y="0" width="2.5" height="12" fill="#1A1A18"/>
                    <rect x="22" y="0" width="16" height="12" fill="#1A1A18"/>
                    <circle cx="48" cy="6" r="6" fill="none" stroke="#1A1A18" stroke-width="1"/>
                    <circle cx="58" cy="6" r="6" fill="none" stroke="#1A1A18" stroke-width="1"/>
                    <path d="M61 4L64 7L68 3" stroke="#1A1A18" stroke-width="1.5"/>
                </svg>
            </div>
        </div>

        <!-- Header -->
        <header class="header">
            <div class="header-date">Tuesday, May 6</div>
            <h1 class="header-title">My Tasks</h1>
            <p class="header-sub"><span id="remaining-count">4</span> tasks remaining · <span id="done-count">0</span> done today</p>
            
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" data-filter="all">All</button>
                <button class="tab" data-filter="today">Today</button>
                <button class="tab" data-filter="upcoming">Upcoming</button>
                <button class="tab" data-filter="done">Done</button>
            </div>
        </header>

        <!-- Task List -->
        <main class="task-list" id="taskList">
            <!-- Tasks will be inserted here by JavaScript -->
        </main>

        <!-- Add Task Area -->
        <section class="add-area">
            <div class="add-row">
                <input 
                    type="text" 
                    class="add-input" 
                    id="taskInput" 
                    placeholder="Add a new task..."
                >
                <button class="add-btn" id="addBtn">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M9 3.75V14.25M3.75 9H14.25" stroke="#1A1A18" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <!-- Options Row -->
            <div class="options-row">
                <button class="opt-btn">
                    <span class="opt-emoji">🩷</span>
                    <span class="opt-label">Due date</span>
                </button>
                <button class="opt-btn">
                    <span class="opt-emoji">🏷</span>
                    <span class="opt-label">Tag</span>
                </button>
                <button class="opt-btn">
                    <span class="opt-emoji">⭐</span>
                    <span class="opt-label">Priority</span>
                </button>
            </div>
        </section>

        <!-- Navigation Bar -->
        <nav class="nav-bar">
            <div class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M3 1.25H17C17.3315 1.25 17.6495 1.3817 17.8839 1.6161C18.1183 1.8505 18.25 2.1685 18.25 2.5V17.5C18.25 17.8315 18.1183 18.1495 17.8839 18.3839C17.6495 18.6183 17.3315 18.75 17 18.75H3C2.6685 18.75 2.3505 18.6183 2.1161 18.3839C1.8817 18.1495 1.75 17.8315 1.75 17.5V2.5C1.75 2.1685 1.8817 1.8505 2.1161 1.6161C2.3505 1.3817 2.6685 1.25 3 1.25M6.75 5H13.25M6.75 9.5H13.25M6.75 14H10" stroke="#1A1A18" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="nav-label">Tasks</span>
            </div>
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <rect x="2" y="3" width="16" height="15" rx="1" stroke="#1A1A18" stroke-width="1.5"/>
                    <path d="M14 1V5M6 1V5M2 7H18" stroke="#1A1A18" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="5" cy="11.5" r="0.5" fill="#1A1A18"/>
                    <circle cx="10" cy="11.5" r="0.5" fill="#1A1A18"/>
                    <circle cx="15" cy="11.5" r="0.5" fill="#1A1A18"/>
                </svg>
                <span class="nav-label">Calendar</span>
            </div>
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M10 1.25C5.16751 1.25 1.25 5.16751 1.25 10C1.25 14.8325 5.16751 18.75 10 18.75C14.8325 18.75 18.75 14.8325 18.75 10C18.75 5.16751 14.8325 1.25 10 1.25M10 5.625V10M10 14.375H10.0083" stroke="#1A1A18" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="nav-label">Alerts</span>
            </div>
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="7" r="4" stroke="#1A1A18" stroke-width="1.5"/>
                    <path d="M2.5 17C2.5 15 5.5 14 10 14C14.5 14 17.5 15 17.5 17" stroke="#1A1A18" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="nav-label">Profile</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
